services:
  - type: web
    name: ai-inventory-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: MODEL_VERSION
        value: latest
      - key: DEBUG
        value: "false"
    autoDeploy: true
